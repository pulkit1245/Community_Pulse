[build]
# Use Dockerfile for building (auto-detected, but explicit is safer)
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway injects $PORT — uvicorn binds to it. Wrapped in bash -c to ensure $PORT is evaluated as an env var.
startCommand = "bash -c 'alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --log-level info'"

# Health check — Railway polls this to know the app is ready
healthcheckPath = "/health"
healthcheckTimeout = 300

# Restart automatically on crash
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
