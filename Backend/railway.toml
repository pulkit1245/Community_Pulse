[build]
# Use Dockerfile for building (auto-detected, but explicit is safer)
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Run migrations before the app starts (separate container)
preDeployCommand = "alembic upgrade head"

# Railway injects $PORT — uvicorn binds to it
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2 --log-level info"

# Health check — Railway polls this to know the app is ready
healthcheckPath = "/health"
healthcheckTimeout = 120

# Restart automatically on crash
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
