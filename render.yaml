services:
  - type: web
    name: disaster-relief-backend
    env: docker
    region: oregon
    plan: free
    rootDir: Backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: disaster-relief-db
          property: connectionString
      - key: SYNC_DATABASE_URL
        fromDatabase:
          name: disaster-relief-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: disaster-relief-db
    databaseName: disaster_relief
    plan: free
