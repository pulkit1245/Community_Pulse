services:
  - type: web
    name: disaster-relief-backend
    env: docker
    region: oregon
    plan: free
    rootDir: Backend
    dockerfilePath: ./Dockerfile
    startCommand: "bash -c 'alembic upgrade head && python -m seed.seed_base && python -m seed.seed_demo && uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --log-level info'"
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: disaster-relief-db
          property: connectionString
      - key: SYNC_DATABASE_URL
        fromDatabase:
          name: disaster-relief-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: disaster-relief-db
    databaseName: disaster_relief
    plan: free
